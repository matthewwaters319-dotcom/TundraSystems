<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pricing — Tundra Systems</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #07080d;
      color: #e8eaf0;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 55% 40% at 15% 60%, rgba(0,180,220,0.07) 0%, transparent 65%),
        radial-gradient(ellipse 45% 35% at 85% 25%, rgba(59,100,255,0.09) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Navbar ── */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 3rem;
      height: 72px;
      background: transparent;
      position: relative;
      z-index: 10;
    }
    .nav-left { display: flex; align-items: center; gap: 1.5rem; }
    .nav-logo { display: flex; align-items: center; gap: 0.6rem; text-decoration: none; flex-shrink: 0; }
    .nav-logo img { height: 44px; width: auto; display: block; }
    .nav-links {
      display: flex; align-items: center; gap: 0.15rem;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 100px; padding: 0.35rem 0.5rem;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    .nav-links a {
      font-size: 0.9375rem; font-weight: 500; color: rgba(232,234,240,0.6);
      text-decoration: none; padding: 0.5rem 1.1rem; border-radius: 100px;
      transition: color 0.18s, background 0.18s; white-space: nowrap;
    }
    .nav-links a:hover, .nav-links a.active { color: #e8eaf0; background: rgba(255,255,255,0.08); }
    .nav-right { display: flex; align-items: center; }
    .btn-discord {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.6rem 1.3rem; border-radius: 10px;
      font-size: 0.9375rem; font-weight: 600; text-decoration: none;
      color: #fff; background: #5865F2; border: none; cursor: pointer;
      transition: background 0.2s, transform 0.15s; white-space: nowrap;
    }
    .btn-discord:hover { background: #4752c4; transform: translateY(-1px); }
    .btn-discord svg { width: 20px; height: 20px; fill: #fff; flex-shrink: 0; }

    /* User pill */
    .user-wrap { position: relative; }
    .user-pill {
      display: inline-flex; align-items: center; gap: 0.6rem;
      padding: 0.35rem 0.9rem 0.35rem 0.35rem; border-radius: 100px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
      font-size: 0.875rem; font-weight: 600; color: #e8eaf0; cursor: pointer; user-select: none;
    }
    .user-pill img { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; }
    .user-pill .chevron { width: 14px; height: 14px; opacity: 0.5; transition: transform 0.2s; }
    .user-wrap.open .chevron { transform: rotate(180deg); }
    .user-dropdown {
      display: none; position: absolute; top: calc(100% + 8px); right: 0;
      min-width: 160px; background: #12151c; border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.5); z-index: 200;
    }
    .user-wrap.open .user-dropdown { display: block; }
    .dropdown-item {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.65rem 1rem; font-size: 0.8125rem; font-weight: 600;
      letter-spacing: 0.02em; font-family: 'Inter', system-ui, sans-serif;
      color: rgba(232,234,240,0.65); cursor: pointer;
      transition: background 0.15s, color 0.15s;
      border: none; background: none; width: 100%; text-align: left;
    }
    .dropdown-item:hover { background: rgba(255,255,255,0.05); color: #e8eaf0; }
    .dropdown-item.danger:hover { background: rgba(237,66,69,0.12); color: #f87171; }
    .dropdown-item svg { width: 15px; height: 15px; flex-shrink: 0; opacity: 0.6; }

    /* ── Page ── */
    .page {
      position: relative; z-index: 1;
      max-width: 520px; margin: 0 auto;
      padding: 5rem 2rem 8rem;
      display: flex; flex-direction: column; align-items: center;
    }

    .page-header { text-align: center; margin-bottom: 2.5rem; }
    .page-header h1 {
      font-size: clamp(1.75rem, 4vw, 2.5rem); font-weight: 800;
      letter-spacing: -0.04em; line-height: 1.1; margin-bottom: 0.75rem;
    }
    .page-header h1 em {
      font-style: normal;
      background: linear-gradient(100deg, #00e5d4 0%, #3b8bff 60%, #a78bfa 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .page-header p { font-size: 0.9375rem; color: rgba(232,234,240,0.45); line-height: 1.7; }

    /* Product card */
    .product-card {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    .product-card::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(0,229,212,0.04) 0%, transparent 60%);
    }

    .product-top {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .product-name { font-size: 1.125rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 0.35rem; }
    .product-desc { font-size: 0.875rem; color: rgba(232,234,240,0.45); line-height: 1.6; }

    .btn-buy {
      display: inline-flex; align-items: center; gap: 0.45rem;
      padding: 0.55rem 1.1rem; border-radius: 10px;
      font-size: 0.875rem; font-weight: 600; color: #fff;
      background: linear-gradient(135deg, #00e5d4, #3b8bff);
      text-decoration: none; white-space: nowrap; flex-shrink: 0;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-buy:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-buy svg { width: 14px; height: 14px; stroke: #fff; fill: none; stroke-width: 2; }

    .divider { height: 1px; background: rgba(255,255,255,0.06); margin: 1.5rem 0; }

    /* Status section */
    .status-section { display: flex; flex-direction: column; gap: 1rem; }

    .status-row {
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
    }

    .roblox-info {
      display: flex; align-items: center; gap: 0.65rem;
      font-size: 0.9rem; color: rgba(232,234,240,0.75); font-weight: 500;
    }

    .roblox-info img { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; border: 1px solid rgba(255,255,255,0.1); }

    .badge-linked {
      display: inline-flex; align-items: center; gap: 0.3rem;
      padding: 0.25rem 0.65rem; border-radius: 100px;
      font-size: 0.75rem; font-weight: 600; letter-spacing: 0.02em;
      background: rgba(0,229,212,0.1); color: #00e5d4;
      border: 1px solid rgba(0,229,212,0.2);
    }

    .badge-claimed {
      display: inline-flex; align-items: center; gap: 0.3rem;
      padding: 0.25rem 0.65rem; border-radius: 100px;
      font-size: 0.75rem; font-weight: 600;
      background: rgba(0,229,212,0.08); color: #00e5d4;
      border: 1px solid rgba(0,229,212,0.15);
    }

    .btn-link-roblox {
      display: inline-flex; align-items: center; gap: 0.5rem;
      width: 100%; justify-content: center;
      padding: 0.75rem 1.5rem; border-radius: 12px;
      font-size: 0.9375rem; font-weight: 600; color: #e8eaf0;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
      cursor: pointer; transition: background 0.2s, transform 0.15s;
      text-decoration: none;
    }
    .btn-link-roblox:hover { background: rgba(255,255,255,0.1); transform: translateY(-1px); }
    .btn-link-roblox svg { width: 18px; height: 18px; flex-shrink: 0; }

    .btn-claim {
      display: inline-flex; align-items: center; gap: 0.45rem;
      padding: 0.55rem 1.1rem; border-radius: 10px;
      font-size: 0.875rem; font-weight: 600; color: #07080d;
      background: #00e5d4; border: none; cursor: pointer;
      transition: opacity 0.2s, transform 0.15s; white-space: nowrap; flex-shrink: 0;
    }
    .btn-claim:hover { opacity: 0.85; transform: translateY(-1px); }

    .note {
      font-size: 0.8125rem; color: rgba(232,234,240,0.3);
      line-height: 1.6; text-align: center; margin-top: 0.5rem;
    }

    /* Not logged in state */
    .auth-prompt {
      width: 100%; text-align: center;
      background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px; padding: 2.5rem 2rem;
    }
    .auth-prompt p { color: rgba(232,234,240,0.45); margin-bottom: 1.25rem; font-size: 0.9375rem; line-height: 1.6; }

    /* Loading */
    .loading { text-align: center; color: rgba(232,234,240,0.3); padding: 3rem; }
    .spinner {
      display: inline-block; width: 24px; height: 24px;
      border: 2px solid rgba(232,234,240,0.1); border-top-color: #00e5d4;
      border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 0.75rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error banner */
    .error-banner {
      width: 100%;
      padding: 0.75rem 1rem; border-radius: 10px; margin-bottom: 1.25rem;
      background: rgba(237,66,69,0.08); border: 1px solid rgba(237,66,69,0.2);
      color: #f87171; font-size: 0.875rem; font-weight: 500; text-align: center;
    }

    /* Success banner */
    .success-banner {
      width: 100%;
      padding: 0.75rem 1rem; border-radius: 10px; margin-bottom: 1.25rem;
      background: rgba(0,229,212,0.07); border: 1px solid rgba(0,229,212,0.2);
      color: #00e5d4; font-size: 0.875rem; font-weight: 500; text-align: center;
    }

    /* ── Claim Modal ── */
    .modal-backdrop {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
      z-index: 500; align-items: center; justify-content: center;
    }
    .modal-backdrop.open { display: flex; }

    .modal-box {
      background: #12151c; border: 1px solid rgba(255,255,255,0.09);
      border-radius: 20px; padding: 2rem;
      width: 100%; max-width: 400px; margin: 1rem;
      position: relative;
    }

    .modal-close {
      position: absolute; top: 1rem; right: 1rem;
      background: none; border: none; color: rgba(232,234,240,0.4);
      cursor: pointer; padding: 0.25rem; line-height: 1;
      font-size: 1.25rem; transition: color 0.15s;
    }
    .modal-close:hover { color: #e8eaf0; }

    .modal-icon {
      width: 52px; height: 52px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.25rem;
      background: linear-gradient(135deg, rgba(0,229,212,0.12), rgba(59,139,255,0.12));
      border: 1px solid rgba(0,229,212,0.15);
    }
    .modal-icon svg { width: 24px; height: 24px; stroke: #00e5d4; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

    .modal-title { font-size: 1.0625rem; font-weight: 700; letter-spacing: -0.02em; text-align: center; margin-bottom: 0.5rem; }
    .modal-desc { font-size: 0.875rem; color: rgba(232,234,240,0.45); text-align: center; line-height: 1.65; margin-bottom: 1.5rem; }

    .modal-actions { display: flex; flex-direction: column; gap: 0.6rem; }

    .btn-modal-claim {
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      padding: 0.8rem 1.5rem; border-radius: 12px;
      font-size: 0.9375rem; font-weight: 700; color: #07080d;
      background: linear-gradient(135deg, #00e5d4, #3b8bff);
      border: none; cursor: pointer; transition: opacity 0.2s;
    }
    .btn-modal-claim:hover { opacity: 0.85; }
    .btn-modal-claim:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-modal-cancel {
      display: flex; align-items: center; justify-content: center;
      padding: 0.75rem 1.5rem; border-radius: 12px;
      font-size: 0.9375rem; font-weight: 600; color: rgba(232,234,240,0.5);
      background: none; border: 1px solid rgba(255,255,255,0.07);
      cursor: pointer; transition: background 0.15s, color 0.15s;
    }
    .btn-modal-cancel:hover { background: rgba(255,255,255,0.04); color: #e8eaf0; }

    .modal-success { text-align: center; padding: 0.5rem 0; }
    .token-count {
      font-size: 3rem; font-weight: 800; letter-spacing: -0.04em;
      background: linear-gradient(100deg, #00e5d4, #3b8bff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      line-height: 1; margin-bottom: 0.35rem;
    }
    .token-label { font-size: 0.875rem; color: rgba(232,234,240,0.4); }

    @media (max-width: 600px) {
      .navbar { padding: 0 1.25rem; }
      .nav-links { display: none; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="nav-left">
      <a href="/" class="nav-logo">
        <img src="/TundraLogo.png" alt="Tundra Systems" />
      </a>
      <div class="nav-links">
        <a href="/features">Features</a>
        <a href="/pricing" class="active">Pricing</a>
        <a href="#">Dashboard</a>
        <a href="https://discord.gg/3WnwKdWYsK" target="_blank" rel="noopener">Support</a>
      </div>
    </div>
    <div class="nav-right" id="nav-right">
      <a href="#" id="discord-btn" class="btn-discord">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
        </svg>
        Login with Discord
      </a>
    </div>
  </nav>

  <main class="page">
    <div class="page-header">
      <h1>Get <em>started.</em></h1>
      <p>Purchase access to Tundra Systems and claim your server token.</p>
    </div>

    <div id="error-area"></div>
    <div id="pricing-content">
      <div class="loading">
        <div class="spinner"></div><br/>Loading...
      </div>
    </div>
  </main>

  <!-- Claim Modal -->
  <div class="modal-backdrop" id="claim-modal">
    <div class="modal-box">
      <button class="modal-close" id="modal-close-btn" aria-label="Close">&times;</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <script>
    const ROBLOX_CLIENT_ID = '4099500283672265370';
    const CATALOG_URL = 'https://www.roblox.com/catalog/138261181271832/Tundra-Systems-CAD-Server';
    const DISCORD_CLIENT_ID = '1502490442879733821';

    let discordToken = null;
    let claimStatus = null;

    // ── Discord OAuth (same pattern as other pages) ──
    function loginWithDiscord() {
      const params = new URLSearchParams({
        client_id: DISCORD_CLIENT_ID,
        redirect_uri: window.location.origin + '/',
        response_type: 'token',
        scope: 'identify'
      });
      window.location.href = 'https://discord.com/oauth2/authorize?' + params.toString();
    }

    function logout() {
      localStorage.removeItem('discord_token');
      localStorage.removeItem('discord_user');
      window.location.reload();
    }

    function showNavUser(user) {
      const avatar = user.avatar
        ? 'https://cdn.discordapp.com/avatars/' + user.id + '/' + user.avatar + '.png?size=64'
        : 'https://cdn.discordapp.com/embed/avatars/' + (Number(user.discriminator || 0) % 5) + '.png';
      const name = user.global_name || user.username;
      const navRight = document.getElementById('nav-right');
      navRight.innerHTML = `
        <div class="user-wrap" id="user-wrap">
          <div class="user-pill" id="user-pill">
            <img src="${avatar}" alt="${name}" />
            <span>${name}</span>
            <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          <div class="user-dropdown">
            <button class="dropdown-item danger" id="logout-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              Log Out
            </button>
          </div>
        </div>`;
      document.getElementById('user-pill').addEventListener('click', function() {
        document.getElementById('user-wrap').classList.toggle('open');
      });
      document.getElementById('logout-btn').addEventListener('click', logout);
      document.addEventListener('click', function(e) {
        const wrap = document.getElementById('user-wrap');
        if (wrap && !wrap.contains(e.target)) wrap.classList.remove('open');
      });
    }

    async function loadNavUser(token) {
      const cached = localStorage.getItem('discord_user');
      if (cached) showNavUser(JSON.parse(cached));
      try {
        const res = await fetch('https://discord.com/api/users/@me', { headers: { Authorization: 'Bearer ' + token } });
        if (!res.ok) { localStorage.removeItem('discord_token'); localStorage.removeItem('discord_user'); return; }
        const user = await res.json();
        localStorage.setItem('discord_user', JSON.stringify(user));
        showNavUser(user);
      } catch (_) {}
    }

    // ── Pricing Page Logic ──
    function getRobloxAuthUrl() {
      const redirectUri = window.location.origin + '/api/roblox/callback';
      const state = btoa(discordToken);
      const params = new URLSearchParams({
        client_id: ROBLOX_CLIENT_ID,
        redirect_uri: redirectUri,
        response_type: 'code',
        scope: 'openid profile',
        state
      });
      return 'https://apis.roblox.com/oauth/v1/authorize?' + params.toString();
    }

    function renderNotLoggedIn() {
      document.getElementById('pricing-content').innerHTML = `
        <div class="auth-prompt">
          <p>You need to log in with Discord before purchasing or claiming a token.</p>
          <button class="btn-discord" id="login-btn" style="margin: 0 auto;">
            <svg viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
            Login with Discord
          </button>
        </div>`;
      document.getElementById('login-btn').addEventListener('click', loginWithDiscord);
    }

    function renderProductCard(status) {
      const robloxSection = buildRobloxSection(status);
      document.getElementById('pricing-content').innerHTML = `
        <div class="product-card">
          <div class="product-top">
            <div>
              <div class="product-name">Tundra Systems CAD Server</div>
              <div class="product-desc">Full access to Tundra Systems CAD for your ER:LC community.</div>
            </div>
            <a href="https://www.roblox.com/catalog/138261181271832/Tundra-Systems-CAD-Server" target="_blank" rel="noopener" class="btn-buy">
              Buy
              <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
            </a>
          </div>
          <div class="divider"></div>
          <div class="status-section" id="status-section">
            ${robloxSection}
          </div>
        </div>`;
      bindStatusButtons(status);
    }

    function buildRobloxSection(status) {
      if (!status.roblox_linked) {
        return `
          <p class="note" style="text-align:left; margin: 0 0 0.75rem; color: rgba(232,234,240,0.45);">Link your Roblox account to claim your access token after purchasing.</p>
          <a href="#" class="btn-link-roblox" id="link-roblox-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
            Link Roblox Account
          </a>`;
      }

      const robloxUsername = status.roblox.roblox_username;
      const robloxId = status.roblox.roblox_id;
      const avatarUrl = `https://www.roblox.com/headshot-thumbnail/image?userId=${robloxId}&width=48&height=48&format=png`;

      if (status.claimed) {
        return `
          <div class="status-row">
            <div class="roblox-info">
              <img src="${avatarUrl}" alt="${robloxUsername}" onerror="this.style.display='none'" />
              <span>@${robloxUsername}</span>
            </div>
            <span class="badge-linked">✓ Linked</span>
          </div>
          <div class="status-row" style="margin-top: 0.25rem;">
            <span style="font-size:0.875rem; color: rgba(232,234,240,0.5);">Access token</span>
            <span class="badge-claimed">✓ 1 token claimed</span>
          </div>`;
      }

      return `
        <div class="status-row">
          <div class="roblox-info">
            <img src="${avatarUrl}" alt="${robloxUsername}" onerror="this.style.display='none'" />
            <span>@${robloxUsername}</span>
          </div>
          <span class="badge-linked">✓ Linked</span>
        </div>
        <div class="status-row" style="margin-top: 0.25rem;">
          <span style="font-size:0.875rem; color: rgba(232,234,240,0.5);">Access token</span>
          <button class="btn-claim" id="open-claim-btn">Claim</button>
        </div>`;
    }

    function bindStatusButtons(status) {
      const linkBtn = document.getElementById('link-roblox-btn');
      if (linkBtn) {
        const authUrl = getRobloxAuthUrl();
        linkBtn.href = authUrl;
        linkBtn.addEventListener('click', function(e) {
          e.preventDefault();
          window.location.href = authUrl;
        });
      }
      const claimBtn = document.getElementById('open-claim-btn');
      if (claimBtn) {
        claimBtn.addEventListener('click', openClaimModal);
      }
    }

    // ── Claim Modal ──
    function openClaimModal() {
      renderModalUnclaimed();
      document.getElementById('claim-modal').classList.add('open');
    }

    function closeClaimModal() {
      document.getElementById('claim-modal').classList.remove('open');
    }

    function renderModalUnclaimed() {
      document.getElementById('modal-content').innerHTML = `
        <div class="modal-icon">
          <svg viewBox="0 0 24 24"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
        </div>
        <div class="modal-title">Claim Your Token</div>
        <div class="modal-desc">You haven't purchased the item yet, or haven't claimed your token. Only claim after purchasing from the Roblox catalog.</div>
        <div class="modal-actions">
          <button class="btn-modal-claim" id="confirm-claim-btn">Claim Token</button>
          <button class="btn-modal-cancel" id="cancel-claim-btn">Cancel</button>
        </div>`;
      document.getElementById('confirm-claim-btn').addEventListener('click', doClaim);
      document.getElementById('cancel-claim-btn').addEventListener('click', closeClaimModal);
    }

    function renderModalClaimed() {
      document.getElementById('modal-content').innerHTML = `
        <div class="modal-success">
          <div class="modal-icon" style="margin-bottom: 1.25rem;">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div class="token-count">1</div>
          <div class="token-label" style="margin-bottom: 1.25rem;">token claimed</div>
          <div class="modal-desc" style="margin-bottom: 1.25rem;">Your Tundra Systems access token has been registered. You're all set!</div>
          <button class="btn-modal-cancel" id="close-success-btn" style="width:100%;">Close</button>
        </div>`;
      document.getElementById('close-success-btn').addEventListener('click', function() {
        closeClaimModal();
        // Refresh claim status on page
        claimStatus.claimed = true;
        claimStatus.tokens = 1;
        renderProductCard(claimStatus);
      });
    }

    async function doClaim() {
      const btn = document.getElementById('confirm-claim-btn');
      if (btn) { btn.disabled = true; btn.textContent = 'Claiming...'; }

      try {
        const res = await fetch('/api/claim', {
          method: 'POST',
          headers: { Authorization: 'Bearer ' + discordToken }
        });
        const data = await res.json();

        if (data.status === 'claimed' || data.status === 'already_claimed') {
          renderModalClaimed();
        } else {
          closeClaimModal();
          showError('Something went wrong: ' + (data.error || 'unknown error'));
        }
      } catch (e) {
        closeClaimModal();
        showError('Network error. Please try again.');
      }
    }

    function showError(msg) {
      document.getElementById('error-area').innerHTML = `<div class="error-banner">${msg}</div>`;
    }

    function showSuccess(msg) {
      document.getElementById('error-area').innerHTML = `<div class="success-banner">${msg}</div>`;
    }

    // ── Init ──
    document.getElementById('modal-close-btn').addEventListener('click', closeClaimModal);
    document.getElementById('claim-modal').addEventListener('click', function(e) {
      if (e.target === this) closeClaimModal();
    });

    document.addEventListener('DOMContentLoaded', async function() {
      // Check for error or success params from OAuth redirect
      const params = new URLSearchParams(window.location.search);
      if (params.get('error')) {
        const errors = {
          roblox_denied: 'Roblox login was cancelled.',
          roblox_token_failed: 'Failed to connect Roblox account. Please try again.',
          discord_invalid: 'Discord session expired. Please log in again.',
          missing_params: 'OAuth error. Please try again.'
        };
        showError(errors[params.get('error')] || 'An error occurred. Please try again.');
      }
      if (params.get('linked') === '1') {
        showSuccess('✓ Roblox account linked successfully!');
      }
      // Clean URL
      if (params.toString()) window.history.replaceState({}, '', '/pricing');

      // Load Discord session
      const stored = localStorage.getItem('discord_token');
      if (!stored) {
        renderNotLoggedIn();
        document.getElementById('discord-btn')?.addEventListener('click', function(e) {
          e.preventDefault(); loginWithDiscord();
        });
        return;
      }

      discordToken = stored;
      await loadNavUser(discordToken);

      // Fetch claim status
      try {
        const res = await fetch('/api/claim/status', {
          headers: { Authorization: 'Bearer ' + discordToken }
        });
        if (!res.ok) {
          localStorage.removeItem('discord_token');
          localStorage.removeItem('discord_user');
          renderNotLoggedIn();
          return;
        }
        claimStatus = await res.json();
        renderProductCard(claimStatus);
      } catch (e) {
        document.getElementById('pricing-content').innerHTML = `<div class="note" style="padding: 2rem;">Failed to load status. Please refresh.</div>`;
      }
    });
  </script>

</body>
</html>
