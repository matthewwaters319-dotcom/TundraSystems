<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tundra Systems</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #07080d;
      color: #e8eaf0;
      min-height: 100vh;
    }

    /* ── Navbar ── */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 3rem;
      height: 72px;
      background: transparent;
    }

    /* Left side: logo + links */
    .nav-left {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    /* Logo */
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      text-decoration: none;
      flex-shrink: 0;
    }

    .nav-logo img {
      height: 44px;
      width: auto;
      display: block;
    }

    /* Pill container around links */
    .nav-links {
      display: flex;
      align-items: center;
      gap: 0.15rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 100px;
      padding: 0.35rem 0.5rem;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .nav-links a {
      font-size: 0.9375rem;
      font-weight: 500;
      color: rgba(232, 234, 240, 0.6);
      text-decoration: none;
      padding: 0.5rem 1.1rem;
      border-radius: 100px;
      transition: color 0.18s, background 0.18s;
      white-space: nowrap;
    }

    .nav-links a:hover {
      color: #e8eaf0;
      background: rgba(255, 255, 255, 0.08);
    }

    /* Right side */
    .nav-right {
      display: flex;
      align-items: center;
    }

    .btn-discord {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1.3rem;
      border-radius: 10px;
      font-size: 0.9375rem;
      font-weight: 600;
      text-decoration: none;
      color: #fff;
      background: #5865F2;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      white-space: nowrap;
    }

    .btn-discord:hover {
      background: #4752c4;
      transform: translateY(-1px);
    }

    .btn-discord svg {
      width: 20px;
      height: 20px;
      fill: #fff;
      flex-shrink: 0;
    }

    /* ── Page background aurora ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 55% 40% at 15% 60%, rgba(0, 180, 220, 0.07) 0%, transparent 65%),
        radial-gradient(ellipse 45% 35% at 85% 25%, rgba(59, 100, 255, 0.09) 0%, transparent 65%),
        radial-gradient(ellipse 30% 25% at 50% 95%, rgba(0, 210, 180, 0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Hero ── */
    .hero {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 7rem 2rem 5rem;
      min-height: calc(100vh - 72px);
      justify-content: center;
    }

    /* Status chip */
    .hero-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: rgba(0, 210, 200, 0.85);
      background: rgba(0, 210, 200, 0.07);
      border: 1px solid rgba(0, 210, 200, 0.18);
      padding: 0.3rem 0.9rem;
      border-radius: 100px;
      margin-bottom: 2rem;
    }

    .chip-pulse {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #00d2c8;
      box-shadow: 0 0 6px #00d2c8;
      animation: blink 2.2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .hero h1 {
      font-size: clamp(2.6rem, 6vw, 4.5rem);
      font-weight: 800;
      letter-spacing: -0.045em;
      line-height: 1.06;
      color: #fff;
      max-width: 780px;
      margin-bottom: 1.4rem;
    }

    .hero h1 em {
      font-style: normal;
      background: linear-gradient(100deg, #00e5d4 0%, #3b8bff 60%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: 1.05rem;
      color: rgba(232, 234, 240, 0.45);
      line-height: 1.75;
      max-width: 480px;
      margin-bottom: 2.75rem;
    }

    /* CTA row */
    .hero-cta {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 4.5rem;
    }

    .btn-begin {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.9rem;
      border-radius: 10px;
      font-size: 0.9375rem;
      font-weight: 700;
      text-decoration: none;
      color: #07080d;
      background: linear-gradient(135deg, #00e5d4 0%, #3bd4ff 100%);
      border: none;
      cursor: pointer;
      box-shadow: 0 0 30px rgba(0, 229, 212, 0.28);
      transition: box-shadow 0.22s, transform 0.18s;
    }

    .btn-begin:hover {
      box-shadow: 0 0 50px rgba(0, 229, 212, 0.45);
      transform: translateY(-2px);
    }

    .btn-ghost {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.75rem 1.6rem;
      border-radius: 10px;
      font-size: 0.9375rem;
      font-weight: 500;
      text-decoration: none;
      color: rgba(232,234,240,0.65);
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-ghost:hover {
      border-color: rgba(255,255,255,0.22);
      color: #e8eaf0;
    }

    /* Logo card */
    .hero-logo-card {
      position: relative;
      width: 100%;
      max-width: 320px;
    }

    .hero-logo-card::before {
      content: '';
      position: absolute;
      inset: -60px;
      background: radial-gradient(ellipse 80% 70% at 50% 50%, rgba(0,229,212,0.1) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-logo-card img {
      position: relative;
      z-index: 1;
      width: 100%;
      height: auto;
      filter: drop-shadow(0 8px 40px rgba(0,229,212,0.18));
    }

    /* Stat pills row */
    .hero-stats {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 3.5rem;
    }

    .stat-pill {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.55rem 1.1rem;
      border-radius: 100px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      font-size: 0.8125rem;
      font-weight: 500;
      color: rgba(232,234,240,0.55);
    }

    .stat-pill strong {
      color: #e8eaf0;
      font-weight: 700;
    }

    /* Grid line overlay */
    .hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 60px 60px;
      -webkit-mask-image: radial-gradient(ellipse 80% 70% at 50% 40%, black 30%, transparent 75%);
      mask-image: radial-gradient(ellipse 80% 70% at 50% 40%, black 30%, transparent 75%);
      pointer-events: none;
      z-index: 0;
    }

    .hero > * { position: relative; z-index: 1; }

    @media (max-width: 640px) {
      .hero { padding: 5rem 1.5rem 3rem; }
      .hero-stats { gap: 0.5rem; }
    }
  </style>
</head>
<body>

  <nav class="navbar">

    <!-- Left: Logo + Nav Links -->
    <div class="nav-left">
      <a href="#" class="nav-logo">
        <img src="TundraLogo.png" alt="Tundra Systems" />
      </a>
      <div class="nav-links">
        <a href="#">Features</a>
        <a href="#">Pricing</a>
        <a href="#">Dashboard</a>
        <a href="#">Support</a>
      </div>
    </div>

    <!-- Right -->
    <div class="nav-right">
      <a href="#" class="btn-discord">
        <!-- Discord logo -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
        </svg>
        Login with Discord
      </a>
    </div>

  </nav>

  <!-- Hero -->
  <section class="hero">
    <h1>Providing Systems for<br /><em>every ER:LC server</em></h1>

    <p class="hero-sub">Revolutionizing ER:LC servers, one roleplay at a time.</p>

    <div class="hero-cta">
      <a href="#" class="btn-begin">Begin &rarr;</a>
    </div>
  </section>

</body>
</html>
